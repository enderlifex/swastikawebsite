<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kręcący się obrazek</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #1a1a1a;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #przycisk {
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, background-color 0.2s;
        }

        #przycisk:hover {
            background-color: #ff5e4d;
            transform: scale(1.05);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #mojObraz {
            display: none;
            width: 250px;
            height: auto;
            border-radius: 10px;
            animation: spin 2s linear infinite;
        }
    </style>
</head>
<body>

    <button id="przycisk">Czy na pewno wyświetlić obraz?</button>
    
    <img id="mojObraz" 
         src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ-lEgumwRSXkcKkpFs2j8pgav4VLLIvvWDYw&s" 
         alt="Kręcący się obrazek">

    <audio id="mojaMuzyka"
           src="https://raw.githubusercontent.com/enderlifex/swastikawebsite/main/erika.mp3"
           loop>
    </audio>

    <script>
        const przycisk = document.getElementById("przycisk");
        const obraz = document.getElementById("mojObraz");
        const audio = document.getElementById("mojaMuzyka");

        przycisk.addEventListener("click", () => {
            // Pokaż obraz
            obraz.style.display = "block";

            // Ukryj przycisk
            przycisk.style.display = "none";

            // Ustaw głośność
            audio.volume = 1.0;

            // Odtwórz muzykę
            audio.play().catch(error => {
                console.log("Autoplay zablokowany:", error);
            });
        });
    </script>

</body>
</html>

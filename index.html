<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kręcący się obrazek</title>
    <style>
        /* Wygląd strony */
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #1a1a1a; /* Ciemne tło */
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Wygląd guzika */
        #przycisk {
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, background-color 0.2s;
        }

        #przycisk:hover {
            background-color: #ff5e4d;
            transform: scale(1.05);
        }

        /* Animacja kręcenia */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Wygląd obrazka */
        #mojObraz {
            display: none; /* Ukryty na starcie */
            width: 250px;
            height: auto;
            border-radius: 10px;
            animation: spin 2s linear infinite; /* Kręci się szybko (2 sekundy) */
        }
    </style>
</head>
<body>

    <button id="przycisk" onclick="pokazObraz()">Czy na pewno wyświetlić obraz?</button>
    
    <img id="mojObraz" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ-lEgumwRSXkcKkpFs2j8pgav4VLLIvvWDYw&s" alt="Kręcący się obrazek">

    <script>
        function pokazObraz() {
            // Pokazuje obrazek
            document.getElementById('mojObraz').style.display = 'block';
            // Ukrywa przycisk
            document.getElementById('przycisk').style.display = 'none';
        }
    </script>

</body>
</html>

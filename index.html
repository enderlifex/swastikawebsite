<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Strona z Obrazkiem</title> <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #222; /* Ciemne tło dla lepszego efektu */
            flex-direction: column;
            font-family: Arial, sans-serif;
        }

        /* Styl guzika */
        #przycisk {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        #przycisk:hover {
            background-color: #ff6b81;
        }

        /* Animacja kręcenia */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Styl obrazka */
        #mojObraz {
            display: none; /* Ukryty na początku */
            width: 300px;  /* Tu możesz zmienić wielkość */
            animation: spin 3s linear infinite; /* 3s to prędkość kręcenia */
        }
    </style>
</head>
<body>

    <button id="przycisk" onclick="pokazObraz()">Czy na pewno wyświetlić obraz?</button>
    
    <img id="mojObraz" src="C:\Nowy folder\images.png" alt="Kręcący się obrazek">

    <script>
        function pokazObraz() {
            // Pokazuje obrazek
            document.getElementById('mojObraz').style.display = 'block';
            // Ukrywa guzik
            document.getElementById('przycisk').style.display = 'none';
        }
    </script>

</body>
</html>
